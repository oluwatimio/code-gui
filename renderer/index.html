<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'">
  <title>Claude Code</title>
  <link id="hljs-theme" rel="stylesheet" href="../node_modules/highlight.js/styles/github-dark.min.css">
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Custom Titlebar -->
  <div id="titlebar">
    <div class="titlebar-center">
      <svg class="titlebar-logo" width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="#00d26a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="titlebar-title">Claude Code</span>
    </div>
    <div class="titlebar-right">
      <button id="btn-toggle-workspace" class="titlebar-btn titlebar-btn-sidebar" title="Toggle Files Panel (Ctrl+Shift+B)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="3" width="12" height="10" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/>
          <line x1="10" y1="3" x2="10" y2="13" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
      <button id="btn-toggle-pr" class="titlebar-btn titlebar-btn-sidebar" title="Toggle PRs Panel (Ctrl+Shift+P)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="4" cy="4" r="1.6" stroke="currentColor" stroke-width="1.2"/>
          <circle cx="4" cy="12" r="1.6" stroke="currentColor" stroke-width="1.2"/>
          <circle cx="12" cy="12" r="1.6" stroke="currentColor" stroke-width="1.2"/>
          <path d="M4 5.6v4.8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M12 10.4V6a2 2 0 0 0-2-2H7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M9 2.5L7 4l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="btn-toggle-sidebar" class="titlebar-btn titlebar-btn-sidebar" title="Toggle Sidebar (Ctrl+B)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="settings-wrapper">
        <button id="btn-settings" class="titlebar-btn titlebar-btn-sidebar" title="Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div id="settings-menu" class="hidden">
          <div class="settings-section">
            <div class="settings-section-label">Theme</div>
            <div class="settings-theme-row">
              <button class="settings-theme-btn" data-theme="system">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                <span>System</span>
              </button>
              <button class="settings-theme-btn" data-theme="light">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                <span>Light</span>
              </button>
              <button class="settings-theme-btn" data-theme="dark">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <span>Dark</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="chats">Chats</button>
        <button class="sidebar-tab" data-tab="memories">Memories</button>
      </div>
      <div id="chats-panel" class="sidebar-panel active">
        <div class="sidebar-header">
          <button id="new-chat-btn" title="New Chat (Ctrl+N)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>New Chat</span>
          </button>
        </div>
        <div id="conversation-list"></div>
      </div>
      <div id="memories-panel" class="sidebar-panel">
        <div class="sidebar-header">
          <input id="memory-search" type="text" placeholder="Search memories..." autocomplete="off">
        </div>
        <div id="memory-list"></div>
      </div>

      <div class="sidebar-footer">
        <button id="toggle-sidebar-btn" title="Toggle Sidebar">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="version-label">v1.0.0</span>
      </div>
      <div class="side-resize" id="sidebar-resize" title="Drag to resize"></div>
    </aside>

    <!-- Chat Area -->
    <main id="chat-area">
      <!-- Welcome Screen -->
      <div id="welcome">
        <div class="welcome-content">
          <div class="welcome-logo">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="#00d26a" opacity="0.15"/>
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="#00d26a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h1>Claude Code</h1>
          <p class="welcome-subtitle">Your AI coding assistant, beautifully wrapped</p>
          <div class="suggestion-chips">
            <button class="chip" data-prompt="Explain how async/await works in JavaScript with examples">Explain async/await</button>
            <button class="chip" data-prompt="Write a Python script that monitors CPU and memory usage">System monitor script</button>
            <button class="chip" data-prompt="Help me write a Bash script to automate my Git workflow">Git automation</button>
            <button class="chip" data-prompt="What are the best practices for writing clean, maintainable code?">Clean code tips</button>
          </div>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages" class="hidden"></div>

      <!-- Terminal Panel -->
      <div id="terminal-panel" class="collapsed">
        <div id="terminal-resize-handle" title="Drag to resize"></div>
        <div id="terminal-header">
          <div class="terminal-title">
            <svg class="term-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="4 17 10 11 4 5"/>
              <line x1="12" y1="19" x2="20" y2="19"/>
            </svg>
            <span id="terminal-label">Terminal</span>
          </div>
          <div id="terminal-tabs" class="terminal-tabs"></div>
          <button id="btn-terminal-new-tab" type="button" class="terminal-new-tab" title="New terminal tab">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
          <div class="terminal-actions">
            <button id="btn-terminal-kill" type="button" title="Kill shell">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
            </button>
            <button id="btn-terminal-close" type="button" title="Close (Ctrl+`)">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="terminal-body"></div>
      </div>

      <!-- Input Area -->
      <div id="input-area">
        <div id="project-bar">
          <button id="project-pill" type="button" title="Select project folder">
            <svg class="project-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span id="project-label">No project</span>
            <svg class="project-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <button id="branch-pill" type="button" class="hidden" title="Current git branch — click to refresh">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="6" y1="3" x2="6" y2="15"/>
              <circle cx="18" cy="6" r="3"/>
              <circle cx="6" cy="18" r="3"/>
              <path d="M18 9a9 9 0 0 1-9 9"/>
            </svg>
            <span id="branch-label"></span>
          </button>
          <button id="branch-pr-pill" type="button" class="hidden" title="Open the PR for this branch">
            <span class="branch-pr-arrow">→</span>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="18" r="3"/>
              <circle cx="6" cy="6" r="3"/>
              <path d="M13 6h3a2 2 0 0 1 2 2v7"/>
              <line x1="6" y1="9" x2="6" y2="21"/>
            </svg>
            <span id="branch-pr-label"></span>
          </button>
          <button id="worktree-btn" type="button" class="hidden" title="Isolate this chat in a git worktree">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19.2 2.96c1 3.38.5 6.19-.1 8.04-2 6-6 9-8.1 9z"/>
              <path d="M2 21c0-3 1.85-5.36 5.08-6"/>
            </svg>
            <span id="worktree-label">Worktree</span>
          </button>
          <div id="extra-dirs-list"></div>
          <button id="add-dir-btn" type="button" title="Add another folder for context">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            <span>Add context</span>
          </button>
        </div>
        <div id="file-picker" class="file-picker hidden"></div>
        <div id="input-wrapper">
          <div id="attachments-list" class="hidden"></div>
          <textarea id="prompt-input" placeholder="Ask Claude anything..." rows="1" autofocus></textarea>
          <div class="input-actions">
            <button id="attach-btn" type="button" title="Attach files or images">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <button id="send-btn" title="Send (Enter)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button id="stop-btn" class="hidden" title="Stop (Escape)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="input-footer">
          <span id="status-text"></span>
          <div class="footer-right">
            <span id="context-usage" class="context-usage hidden" title="Context window usage">
              <span class="context-usage-bar"><span class="context-usage-fill"></span></span>
              <span class="context-usage-label"></span>
            </span>
            <button id="btn-toggle-terminal" type="button" title="Toggle terminal (Ctrl+`)">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="4 17 10 11 4 5"/>
                <line x1="12" y1="19" x2="20" y2="19"/>
              </svg>
              <span>Terminal</span>
            </button>
            <button id="btn-save-memory" type="button" title="Ask Claude to save the conversation to memory">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              <span>Save memory</span>
            </button>
            <button id="btn-yolo" type="button" title="YOLO mode — skip all permission prompts">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
              </svg>
              <span class="yolo-label">YOLO</span>
            </button>
            <div class="model-wrapper">
              <button id="model-selector" type="button" title="Select model">
                <span id="model-label">Default</span>
                <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </button>
              <div id="model-menu" class="hidden"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Workspace Panel -->
    <aside id="workspace-panel" class="collapsed">
      <div class="side-resize side-resize-left" id="workspace-resize" title="Drag to resize"></div>
      <div class="ws-view-tabs">
        <button class="ws-view-tab active" data-view="edits">
          <span>Edits</span>
          <span class="ws-view-tab-count" id="ws-edits-count" hidden></span>
        </button>
        <button class="ws-view-tab" data-view="workspace">
          <span>Files</span>
          <span class="ws-view-tab-dot" id="ws-files-dot" hidden></span>
        </button>
        <button class="ws-view-tab" data-view="tools">
          <span>Tools</span>
          <span class="ws-view-tab-count" id="ws-tools-count" hidden></span>
        </button>
      </div>
      <div class="ws-view active" data-view="edits">
        <div id="ws-changed-list" class="ws-changed-list"></div>
      </div>
      <div class="ws-view" data-view="workspace">
        <div class="ws-tree-wrap">
          <div class="ws-tree" id="ws-tree"></div>
        </div>
      </div>
      <div class="ws-view" data-view="tools">
        <div id="ws-tools-filters"></div>
        <div id="ws-tools-list"></div>
      </div>
    </aside>

    <!-- PR Panel -->
    <aside id="pr-panel" class="collapsed">
      <div class="side-resize side-resize-left" id="pr-resize" title="Drag to resize"></div>
      <div id="pr-header">
        <div id="pr-title-row">
          <button id="pr-back-btn" class="hidden" title="Back to list">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <div id="pr-header-label">Pull Requests</div>
          <div id="pr-header-spacer"></div>
          <button id="pr-refresh-btn" title="Refresh">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
          </button>
        </div>
        <div id="pr-repo-label"></div>
        <div id="pr-filter-row">
          <button class="pr-filter-btn active" data-filter="mine">My PRs</button>
          <button class="pr-filter-btn" data-filter="all">All open</button>
        </div>
      </div>
      <div id="pr-body">
        <div id="pr-list" class="pr-view"></div>
        <div id="pr-detail" class="pr-view hidden"></div>
      </div>
    </aside>
  </div>

  <!-- Inline Prompt Dialog -->
  <div id="prompt-overlay" class="hidden">
    <div id="prompt-dialog">
      <h3 id="prompt-title">Input</h3>
      <p id="prompt-description" class="prompt-description"></p>
      <input id="prompt-input-field" type="text" autocomplete="off">
      <div class="prompt-actions">
        <button id="prompt-cancel" class="perm-btn perm-btn-deny">Cancel</button>
        <button id="prompt-ok" class="perm-btn perm-btn-allow">OK</button>
      </div>
    </div>
  </div>

  <!-- Inline Confirm Dialog -->
  <div id="confirm-overlay" class="hidden">
    <div id="confirm-dialog">
      <h3 id="confirm-title">Confirm</h3>
      <p id="confirm-description" class="prompt-description"></p>
      <div class="prompt-actions">
        <button id="confirm-cancel" class="perm-btn perm-btn-deny">Cancel</button>
        <button id="confirm-ok" class="perm-btn perm-btn-allow">Continue</button>
      </div>
    </div>
  </div>

  <!-- File viewer modal -->
  <div id="file-modal-overlay" class="file-modal-overlay hidden">
    <div id="file-modal" class="file-modal">
      <div class="file-modal-header">
        <div class="file-modal-title">
          <span id="file-modal-name"></span>
          <span id="file-modal-subtitle" class="file-modal-subtitle"></span>
        </div>
        <div id="file-modal-actions" class="file-modal-actions">
          <div class="file-modal-viewtoggle" role="tablist">
            <button id="file-modal-view-content" type="button" class="file-modal-viewtab active" data-view="content">Content</button>
            <button id="file-modal-view-diff" type="button" class="file-modal-viewtab" data-view="diff">
              <span>Diff</span>
              <span id="file-modal-diff-badge" class="file-modal-diff-badge" hidden></span>
            </button>
          </div>
          <div class="file-modal-ide-wrap">
            <button id="file-modal-ide-btn" class="file-modal-ide-btn" type="button" title="Open in external editor">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              <span id="file-modal-ide-label">Open in…</span>
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div id="file-modal-ide-menu" class="file-modal-ide-menu hidden"></div>
          </div>
          <button id="file-modal-close" class="file-modal-close" type="button" title="Close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
      <div id="file-modal-body" class="file-modal-body"></div>
    </div>
  </div>

  <!-- Ask-User Dialog -->
  <div id="ask-overlay" class="hidden">
    <div id="ask-dialog">
      <div class="ask-header">
        <div class="ask-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00d26a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            <path d="M9.5 9a2.5 2.5 0 1 1 3.5 2.29V13" stroke-linecap="round"/>
            <circle cx="12" cy="16" r="0.6" fill="#00d26a" stroke="none"/>
          </svg>
        </div>
        <h3>Claude has a question</h3>
      </div>
      <div id="ask-question" class="ask-question"></div>
      <div id="ask-context" class="ask-context hidden"></div>
      <div id="ask-options" class="ask-options hidden"></div>
      <textarea id="ask-answer-input" class="ask-answer-input" rows="3" placeholder="Type your answer… (Cmd/Ctrl+Enter to send)"></textarea>
      <div class="ask-actions">
        <button id="ask-cancel" class="perm-btn perm-btn-deny">Cancel</button>
        <button id="ask-submit" class="perm-btn perm-btn-allow">Send answer</button>
      </div>
    </div>
  </div>

  <!-- Permission Dialog -->
  <div id="permission-overlay" class="hidden">
    <div id="permission-dialog">
      <div class="perm-header">
        <div class="perm-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 9v4M12 17h.01" stroke="#00d26a" stroke-width="2" stroke-linecap="round"/>
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="#00d26a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h3>Permission Request</h3>
      </div>
      <p class="perm-description">Claude wants to use <strong id="perm-tool-name"></strong></p>
      <div id="perm-detail" class="perm-code-block">
        <pre><code id="perm-input-display"></code></pre>
      </div>
      <div class="perm-actions">
        <button id="perm-deny" class="perm-btn perm-btn-deny">Deny</button>
        <button id="perm-allow" class="perm-btn perm-btn-allow">Allow</button>
      </div>
    </div>
  </div>

  <script src="../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="../lib/session-logic.js"></script>
  <script src="../lib/terminal-tabs.js"></script>
  <script src="../lib/fuzzy-match.js"></script>
  <script src="components/spotlight.js"></script>
  <script src="app.js"></script>
