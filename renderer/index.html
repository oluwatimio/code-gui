<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'">
  <title>Claude Code</title>
  <link rel="stylesheet" href="../node_modules/highlight.js/styles/github-dark.min.css">
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Custom Titlebar -->
  <div id="titlebar">
    <div class="titlebar-center">
      <svg class="titlebar-logo" width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="#00d26a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="titlebar-title">Claude Code</span>
    </div>
    <div class="titlebar-right">
      <button id="btn-toggle-workspace" class="titlebar-btn titlebar-btn-sidebar" title="Toggle Files Panel (Ctrl+Shift+B)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="3" width="12" height="10" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/>
          <line x1="10" y1="3" x2="10" y2="13" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
      <button id="btn-toggle-sidebar" class="titlebar-btn titlebar-btn-sidebar" title="Toggle Sidebar (Ctrl+B)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main App -->
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="chats">Chats</button>
        <button class="sidebar-tab" data-tab="memories">Memories</button>
      </div>
      <div id="chats-panel" class="sidebar-panel active">
        <div class="sidebar-header">
          <button id="new-chat-btn" title="New Chat (Ctrl+N)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>New Chat</span>
          </button>
        </div>
        <div id="conversation-list"></div>
      </div>
      <div id="memories-panel" class="sidebar-panel">
        <div class="sidebar-header">
          <input id="memory-search" type="text" placeholder="Search memories..." autocomplete="off">
        </div>
        <div id="memory-list"></div>
      </div>

      <div class="sidebar-footer">
        <button id="toggle-sidebar-btn" title="Toggle Sidebar">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="version-label">v1.0.0</span>
      </div>
      <div class="side-resize" id="sidebar-resize" title="Drag to resize"></div>
    </aside>

    <!-- Chat Area -->
    <main id="chat-area">
      <!-- Welcome Screen -->
      <div id="welcome">
        <div class="welcome-content">
          <div class="welcome-logo">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="#00d26a" opacity="0.15"/>
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="#00d26a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h1>Claude Code</h1>
          <p class="welcome-subtitle">Your AI coding assistant, beautifully wrapped</p>
          <div class="suggestion-chips">
            <button class="chip" data-prompt="Explain how async/await works in JavaScript with examples">Explain async/await</button>
            <button class="chip" data-prompt="Write a Python script that monitors CPU and memory usage">System monitor script</button>
            <button class="chip" data-prompt="Help me write a Bash script to automate my Git workflow">Git automation</button>
            <button class="chip" data-prompt="What are the best practices for writing clean, maintainable code?">Clean code tips</button>
          </div>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages" class="hidden"></div>

      <!-- Terminal Panel -->
      <div id="terminal-panel" class="collapsed">
        <div id="terminal-resize-handle" title="Drag to resize"></div>
        <div id="terminal-header">
          <div class="terminal-title">
            <svg class="term-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="4 17 10 11 4 5"/>
              <line x1="12" y1="19" x2="20" y2="19"/>
            </svg>
            <span id="terminal-label">Terminal</span>
          </div>
          <div class="terminal-actions">
            <button id="btn-terminal-kill" type="button" title="Kill shell">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
            </button>
            <button id="btn-terminal-close" type="button" title="Close (Ctrl+`)">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="terminal-body"></div>
      </div>

      <!-- Input Area -->
      <div id="input-area">
        <div id="project-bar">
          <button id="project-pill" type="button" title="Select project folder">
            <svg class="project-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span id="project-label">No project</span>
            <svg class="project-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <button id="branch-pill" type="button" class="hidden" title="Current git branch — click to refresh">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="6" y1="3" x2="6" y2="15"/>
              <circle cx="18" cy="6" r="3"/>
              <circle cx="6" cy="18" r="3"/>
              <path d="M18 9a9 9 0 0 1-9 9"/>
            </svg>
            <span id="branch-label"></span>
          </button>
          <div id="extra-dirs-list"></div>
          <button id="add-dir-btn" type="button" title="Add another folder for context">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            <span>Add context</span>
          </button>
        </div>
        <div id="input-wrapper">
          <textarea id="prompt-input" placeholder="Ask Claude anything..." rows="1" autofocus></textarea>
          <div class="input-actions">
            <button id="send-btn" title="Send (Enter)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button id="stop-btn" class="hidden" title="Stop (Escape)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="input-footer">
          <span id="status-text"></span>
          <div class="footer-right">
            <span id="cost-display"></span>
            <button id="btn-toggle-terminal" type="button" title="Toggle terminal (Ctrl+`)">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="4 17 10 11 4 5"/>
                <line x1="12" y1="19" x2="20" y2="19"/>
              </svg>
              <span>Terminal</span>
            </button>
            <button id="btn-save-memory" type="button" title="Ask Claude to save the conversation to memory">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              <span>Save memory</span>
            </button>
            <button id="btn-yolo" type="button" title="YOLO mode — skip all permission prompts">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
              </svg>
              <span class="yolo-label">YOLO</span>
            </button>
            <div class="model-wrapper">
              <button id="model-selector" type="button" title="Select model">
                <span id="model-label">Default</span>
                <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </button>
              <div id="model-menu" class="hidden"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Workspace Panel -->
    <aside id="workspace-panel" class="collapsed">
      <div class="side-resize side-resize-left" id="workspace-resize" title="Drag to resize"></div>
      <div class="ws-tabs" id="ws-tabs"></div>
      <div class="ws-tree-wrap">
        <div class="ws-tree" id="ws-tree"></div>
      </div>
      <div class="ws-vsplitter" id="ws-vsplitter" title="Drag to resize"></div>
      <div class="ws-tiles" id="ws-tiles"></div>
    </aside>
  </div>

  <!-- Permission Dialog -->
  <div id="permission-overlay" class="hidden">
    <div id="permission-dialog">
      <div class="perm-header">
        <div class="perm-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 9v4M12 17h.01" stroke="#00d26a" stroke-width="2" stroke-linecap="round"/>
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="#00d26a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h3>Permission Request</h3>
      </div>
      <p class="perm-description">Claude wants to use <strong id="perm-tool-name"></strong></p>
      <div id="perm-detail" class="perm-code-block">
        <pre><code id="perm-input-display"></code></pre>
      </div>
      <div class="perm-actions">
        <button id="perm-deny" class="perm-btn perm-btn-deny">Deny</button>
        <button id="perm-allow" class="perm-btn perm-btn-allow">Allow</button>
      </div>
    </div>
  </div>

  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="app.js"></script>
</body>
</html>
